<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev@8.6.4/external-library.js"></script>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

      function ChatInput(){
        return (
          <div>
              <input
              placeholder="type a message here to chatbot" 
              size = "50"
              />
          <button>Send</button>
          </div>
        )
      }


      function ChatMessage ({message, sender}){ // best practise
        
       // const message=props.message;
        //const sender=props.sender;
       // const {message}=props;.....destructuring   or we can also write like  const {message, sender}=props; or

        /* if(sender === 'robot'){
          return(
            <div>
              <img src="robot.png" alt="Robot Avatar" width="50" height="50"/>
              {message}
            </div>
          )
        } */

        return(
          <div>
            {sender === 'robot' && (
              <img src="robot.png" alt="Robot Avatar" width="50" height="50"/>
              )}
              
               {message}
               {sender === 'user' &&
                (<img src="user.png" alt="User Avatar" width="50" height="50"/>
                )}

          </div>
        )

      }

      function ChatMessages(){
        return (
          <div>
            <p>User: Hello</p>
            <p>Chatbot: Hi there!</p>
          </div>
        )
      }

      const app = (
          <>
          
          <ChatInput/>
          <ChatMessage message="Hello Chatbot!" sender="user"/>
          <ChatMessage message="Hello! How can I help you?" sender="robot"/>
          <ChatMessage message="Can you get me today's date?" sender="user"/>
          <ChatMessage message="Today is April 5th." sender="robot"/>
          </>
         )



      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(app);
    </script>
  </body>
</html>
